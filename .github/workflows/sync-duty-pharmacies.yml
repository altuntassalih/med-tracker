name: Nöbetçi Eczane Senkronizasyonu

on:
  schedule:
    # --- HAFTA İÇİ PROGRAMI (Pazartesi - Cuma) ---
    # Türkiye Saati ile 09:15'te çalışır (06:15 UTC)
    - cron: '15 6 * * 1-5'
    # Türkiye Saati ile 18:30'da çalışır (15:30 UTC)
    - cron: '30 15 * * 1-5'
    # Türkiye Saati ile 23:00'da çalışır (20:00 UTC)
    - cron: '0 20 * * 1-5'

    # --- HAFTA SONU PROGRAMI (Cumartesi - Pazar) ---
    # Türkiye Saati ile 09:15'ten 00:15'e kadar her 3 saatte bir çalışır (UTC: 06:15, 09:15, 12:15, 15:15, 18:15, 21:15)
    - cron: '15 6,9,12,15,18,21 * * 0,6'
  repository_dispatch:
    types: [sync-duty-pharmacies]
  workflow_dispatch: # Manuel tetikleme desteği

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    name: Nöbetçi Eczaneleri Senkronize Et
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Bağımlılıkları Yükle
        run: npm ci || npm install --no-audit

      - name: Nöbetçileri Senkronize Et
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EXPO_PUBLIC_COLLECTAPI_KEY: ${{ secrets.EXPO_PUBLIC_COLLECTAPI_KEY }}
          CLOUDFLARE_PROXY_URL: ${{ secrets.CLOUDFLARE_PROXY_URL }}
        run: node scripts/sync-pharmacies.js --duty
