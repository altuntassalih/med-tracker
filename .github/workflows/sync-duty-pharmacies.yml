name: Nöbetçi Eczane Senkronizasyonu

on:
  schedule:
    # Türkiye Saati ile Sabah 09:15'te çalışır (06:15 UTC)
    - cron: '15 6 * * *'
    # Türkiye Saati ile Öğleden Sonra 14:00'te çalışır (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: # Manuel tetikleme desteği

jobs:
  sync:
    name: Nöbetçi Eczaneleri Senkronize Et
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Bağımlılıkları Yükle
        run: npm ci || npm install --no-audit

      - name: Nöbetçileri Senkronize Et
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EXPO_PUBLIC_COLLECTAPI_KEY: ${{ secrets.EXPO_PUBLIC_COLLECTAPI_KEY }}
          CLOUDFLARE_PROXY_URL: ${{ secrets.CLOUDFLARE_PROXY_URL }}
        run: node scripts/sync-pharmacies.js --duty
